name: Build & Release .exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:  # Manuelles Auslösen möglich

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install customtkinter darkdetect packaging cryptography

      - name: Build executable with PyInstaller
        shell: cmd
        run: |
          pyinstaller ^
            --onefile ^
            --windowed ^
            --name "StudienDashboard" ^
            --add-data "studien_daten.enc:." ^
            --add-data "studien_daten_vorlage.json:." ^
            --icon icon.ico ^
            app.py

      - name: Upload .exe as Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/StudienDashboard.exe
          name: "Release ${{ github.ref_name }}"
          body: |
            ## Studien-Dashboard ${{ github.ref_name }}

            ### Windows (x64)
            - [StudienDashboard.exe](https://github.com/cantosun99/studium-dashboard-project/releases/download/v1.0.0/StudienDashboard.exe) - Fertige .exe, keine Installation nötig

            ### Nutzung
            1. Datei herunterladen
            2. `StudienDashboard.exe` starten
            3. "Meine Daten laden -> Ja" wählen und den Schlüssel eingeben.
              Der Schlüssel liegt der Installationsanleitung in der Atlas Abgabe bei.
            4. Fertig!

            ### Anti-Virus Hinweis
            Da dies eine nicht-signierte .exe ist, wird sehr wahrscheinlich sowohl der Browser den Download, als auch Windows Defender das Ausführen der .exe verhindern wollen.
            
            **Falls der Browser den Download blockiert:**
            1. Im Browser die aktuellen Downloads anzeigen lassen
            2. Die Meldung sollte "StudienDashboard.exe kann nicht sicher heruntergeladen werden" heißen
            3. Rechts auf die drei Punkte klicken
            4. Auf "Beibehalten" klicken
            
            **Falls Windows Defender den Download blockiert:**
            1. Auf "Weitere Informationen" klicken
            2. Auf "Trotzdem ausführen" klicken
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
