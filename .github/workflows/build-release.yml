name: Build & Release .exe

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:  # Manuelles Auslösen möglich

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install customtkinter darkdetect packaging cryptography

      - name: Build executable with PyInstaller
        shell: cmd
        run: |
          pyinstaller ^
            --onefile ^
            --windowed ^
            --name "StudienDashboard" ^
            --add-data "studien_daten.enc:." ^
            --add-data "studien_daten_vorlage.json:." ^
            --icon NONE ^
            app.py

      - name: Upload .exe as Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/StudienDashboard.exe
          name: "Release ${{ github.ref_name }}"
          body: |
            ## Studien-Dashboard ${{ github.ref_name }}

            **Windows (x64)**
            - [StudienDashboard.exe](StudienDashboard.exe) – Single-File, keine Installation nötig

            ### Nutzung
            1. Datei herunterladen
            2. `StudienDashboard.exe` starten
            3. "Meine Daten laden" wählen und den Schlüssel eingeben
            4. Fertig!

            > **Schlüssel:** Liegt der Abgabe bei (per E-Mail).
            > Falls dein Antivirus die Datei blockiert: Rechtsklick → Eigenschaften → "Entsperren" aktivieren.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
